name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Cache dla apt — gcc-arm-none-eabi to 588MB, pobieramy raz
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-arm-none-eabi-${{ runner.os }}
        restore-keys: apt-arm-none-eabi-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

    # Cache dla pico-sdk — submoduły to kolejne ~200MB
    - name: Cache pico-sdk
      uses: actions/cache@v4
      id: cache-pico-sdk
      with:
        path: pico-sdk
        key: pico-sdk-2.1.0

    - name: Install Pico SDK
      if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git --branch 2.1.0 --depth 1
        cd pico-sdk
        git submodule update --init --recursive

    - name: Build
      run: |
        export PICO_SDK_PATH=${{ github.workspace }}/pico-sdk
        cmake -DPICO_BOARD=pico_w -B build -S .
        cd build
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: uf2loader-pico2w
        path: |
          build/**/*.uf2
        retention-days: 30
